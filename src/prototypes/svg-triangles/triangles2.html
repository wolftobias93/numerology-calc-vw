<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Numerology Triangles</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .num-circle {
      fill: #cfefff;
      stroke: #222;
      stroke-width: 3;
    }

    .num-text {
      font: 700 20px system-ui, -apple-system, Segoe UI, Roboto, Arial;
      fill: #111;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .tri-line {
      stroke: #222;
      stroke-width: 3;
      fill: none;
    }

    .tri-label {
      font: 600 14px system-ui;
      letter-spacing: .3em;
      fill: #111;
    }
  </style>
</head>

<body class="bg-light">
  <div class="container py-4">
    <div class="row g-4">

      <!-- HERAUSFORDERUNGEN (unchanged, correct) -->
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-body text-center">
            <h6 class="fw-bold mb-3">HERAUSFORDERUNGEN</h6>

            <svg viewBox="0 0 200 220" class="w-100">
              <!-- outer V -->
              <path class="tri-line" d="M55 40 L95 200" />
              <path class="tri-line" d="M145 40 L105 200" />

              <!-- connectors -->
              <path class="tri-line" d="M70 75 L100 110 L130 75" />
              <path class="tri-line" d="M100 130 L100 165" />

              <!-- circles + text -->
              <circle class="num-circle" cx="70" cy="75" r="20" />
              <text class="num-text" x="70" y="75">5</text>

              <circle class="num-circle" cx="130" cy="75" r="20" />
              <text class="num-text" x="130" y="75">1</text>

              <circle class="num-circle" cx="100" cy="120" r="20" />
              <text class="num-text" x="100" y="120">4</text>

              <circle class="num-circle" cx="100" cy="175" r="20" />
              <text class="num-text" x="100" y="175">6</text>

              <text class="tri-label" x="100" y="210" text-anchor="middle">
                MONAT&nbsp;TAG&nbsp;JAHR
              </text>
            </svg>
          </div>
        </div>
      </div>

      <!-- HÖHEPUNKTE (flipped Herausforderungen, text corrected) -->
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-body text-center">
            <h6 class="fw-bold mb-3">HÖHEPUNKTE</h6>

            <svg viewBox="0 0 200 220" class="w-100">
              <!-- flip geometry -->
              <g transform="translate(0,220) scale(1,-1)">
                <!-- outer V (mirrored) -->
                <path class="tri-line" d="M55 40 L95 200" />
                <path class="tri-line" d="M145 40 L105 200" />

                <!-- connectors -->
                <path class="tri-line" d="M70 75 L100 110 L130 75" />
                <path class="tri-line" d="M100 130 L100 165" />

                <!-- circles -->
                <circle class="num-circle" cx="70" cy="75" r="20" />
                <circle class="num-circle" cx="130" cy="75" r="20" />
                <circle class="num-circle" cx="100" cy="120" r="20" />
                <circle class="num-circle" cx="100" cy="175" r="20" />

                <!-- counter-flipped text -->
                <text class="num-text" x="70" y="-75" transform="scale(1,-1)">4</text>
                <text class="num-text" x="130" y="-75" transform="scale(1,-1)">7</text>
                <text class="num-text" x="100" y="-120" transform="scale(1,-1)">2</text>
                <text class="num-text" x="100" y="-175" transform="scale(1,-1)">3</text>
              </g>

              <text class="tri-label" x="100" y="210" text-anchor="middle">
                MONAT&nbsp;TAG&nbsp;JAHR
              </text>
            </svg>
          </div>
        </div>
      </div>

    </div>
  </div>
</body>

</html>
